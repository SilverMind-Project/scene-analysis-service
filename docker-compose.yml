# Scene Analysis Service — Docker Compose
#
# Multi-modal scene analysis: YOLO object detection, Florence-2 structured
# descriptions, and CLIP image embeddings.
#
# Usage (CPU):
#   docker compose up -d
#
# Usage (GPU):
#   docker compose --profile gpu up -d
#
# Build with inference deps (required for actual model inference):
#   docker compose build --build-arg EXTRAS=inference
#
# Requires: NVIDIA Container Toolkit for GPU profile.

services:
  scene-analysis:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        EXTRAS: ""          # set to "inference" to include torch/ultralytics
    container_name: scene-analysis-service
    restart: unless-stopped
    ports:
      - "8300:8300"
    environment:
      SAS_DEVICE: "auto"          # auto | cuda | cpu | openvino
      SAS_YOLO_ENABLED: "true"
      SAS_FLORENCE_ENABLED: "true"
      SAS_CLIP_ENABLED: "true"
      SAS_LOG_LEVEL: "info"
    volumes:
      - scene-analysis-models:/root/.cache   # HuggingFace + YOLO model cache
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 60s    # model loading can take time on first start

volumes:
  scene-analysis-models:
    driver: local
