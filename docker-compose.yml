# Scene Analysis Service — Docker Compose
#
# Multi-modal scene analysis via Triton Inference Server.
#
# Usage:
#   docker compose up -d
#
# Requires: Triton Inference Server running (shared with continuous-tracking).

services:
  scene-analysis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: scene-analysis-service
    restart: unless-stopped
    ports:
      - "8300:8300"
    environment:
      SAS_TRITON_URL: "triton:8701"
      SAS_YOLO_ENABLED: "true"
      SAS_FLORENCE_ENABLED: "true"
      SAS_CLIP_ENABLED: "true"
      SAS_LOG_LEVEL: "info"
    networks:
      - nanai
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8300/health')"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  nanai:
    name: nanai
    external: true
